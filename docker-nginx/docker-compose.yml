services:
  nginx:
    container_name: nginx
    image: nginx
    restart: always
    network_mode: host
    volumes:
      - "./conf/nginx.conf:/etc/nginx/nginx.conf"
      - "./conf/conf.d:/etc/nginx/conf.d"
      - "./html:/usr/share/nginx/html"
      - "./log:/var/log/nginx"
    environment:                        
      TZ: Asia/Shanghai
      LANG: en_US.UTF-8